# Theater automation suite. The backend MUST be on the theater subnet because
# the Trinnov and MadVR Envy accept control only from the same subnet, and
# MadVR power-on uses Wake-on-LAN broadcast. host networking satisfies this.
# See docs/CONFIGURATION.md (Networking).

services:
  theater-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theater-control
    network_mode: host          # required; do not switch to bridge without a plan for same-subnet control + WoL
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    # Port is APP_PORT from .env (default 8080). With host networking the
    # service is reachable at http://<host-ip>:<APP_PORT>.
