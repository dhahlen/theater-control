# Copy this file to config/devices.yaml and fill in your values.
# Secrets (passwords, keys, tokens) go in .env, NOT here.

# ---- Main theater (Phase 1) ----

jvc:
  host: "192.168.1.10"
  port: 20554
  target_input: "hdmi1"
  target_picture_mode: "frame_adapt_hdr"
  # password is provided via JVC_PASSWORD in .env

trinnov:
  host: "192.168.1.11"
  port: 44100
  safe_max_volume: -20        # constrain the UI slider maximum
  sources:                    # friendly_name: trinnov_source_id (confirm ids)
    kaleidescape: 0
    plex: 1
    madvr: 2
    gaming_pc: 3

madvr:
  host: "192.168.1.12"
  port: 44077
  mac: "00:11:22:33:44:55"    # required for Wake-on-LAN power on
  heartbeat_seconds: 5
  profiles:                   # source_name: stored settings slot (fallback path)
    kaleidescape: "1"
    plex: "1"
    gaming_pc: "2"
  # Preferred per-source profile setup run by Theater On: an ordered list of raw
  # Envy command lines. "Delay <ms>" paces multi-step sequences. Allowed verbs:
  # SetAspectRatioMode, KeyPress, KeyHold, RestoreSettings. On Envys where GREEN
  # cycles picture profiles, combine SetAspectRatioMode (deterministic) with
  # KeyPress GREEN. Omit to fall back to profiles/slots, then Envy auto profiles.
  profile_macros:
    kaleidescape:
      - "SetAspectRatioMode 2.40:1"
    gaming_pc:
      - "SetAspectRatioMode 16:9"

kaleidescape:
  host: "192.168.1.13"
  port: 10000
  device_id: "01"

plex:
  base_url: "http://192.168.1.20:32400"
  web_url: "http://192.168.1.20:32400/web"
  default_player_id: ""
  # token is provided via PLEX_TOKEN in .env

hue:
  bridge_ip: "192.168.1.30"
  room_group_id: "1"
  scenes:
    movie: "REPLACE_WITH_SCENE_ID"
    bright: "REPLACE_WITH_SCENE_ID"
    "off": "REPLACE_WITH_SCENE_ID"   # quote "off": bare off is YAML boolean false
  # app key provided via HUE_APP_KEY in .env

# Optional Tautulli source: merges product, quality profile, per-stream
# direct-play/transcode decisions, location, and bandwidth into now-playing.
tautulli:
  base_url: "http://192.168.1.20:8181"
  # API key provided via TAUTULLI_API_KEY in .env

# Optional gaming PC telemetry (read-only), via Libre Hardware Monitor. Install
# Libre Hardware Monitor on the PC, and under Options enable "Run web server"
# (default port 8085). The adapter polls its JSON tree for CPU/GPU temperature,
# load, and power and surfaces them on a Gaming PC tab.
gaming_pc:
  host: "192.168.1.60"
  port: 8085
  path: "/data.json"

# ---- Source-specific behavior for Theater On ----

sources:
  kaleidescape:
    jvc_input: "hdmi1"
    low_latency: false
  plex:
    jvc_input: "hdmi1"
    low_latency: false
  gaming_pc:
    jvc_input: "hdmi2"
    low_latency: true

default_source: "kaleidescape"

theater_off:
  power_off_trinnov: false
  lighting_scene: "bright"

# ---- Pool house (Phase 2 — a second room registered under ph_* device ids) ----
# Reuses the adapter layer with a distinct device set. Omit this whole block to
# run the theater-only build. The shared Plex server/token come from `plex` above.

poolhouse:
  trinnov:                    # Trinnov Altitude 16 (distinct from the theater CI)
    host: "192.168.1.50"
    sources:                  # friendly_name: source id (confirm on the live unit)
      shield: 0
      gaming_pc: 1
      switch2: 2
      switch1: 3
      node: 4
  hue:                        # Office Hue bridge; each zone is its own group
    bridge_ip: "192.168.1.51"
    zones:
      poolhouse:
        group: "3"            # Pool House room (contains the Bar and Lounge zones)
      bar:
        group: "4"
      lounge:
        group: "5"
      office:
        group: "1"
        scenes:               # only groups with saved scenes need this
          "Dim": "REPLACE_WITH_SCENE_ID"
          "Bright White": "REPLACE_WITH_SCENE_ID"
    # app key provided via HUE_POOLHOUSE_APP_KEY in .env
  lg:                         # LG G5 display (webOS SSAP)
    host: "192.168.1.52"
    port: 3001               # 3001 = secure wss (webOS 2023+); 3000 = legacy ws
    mac: "AA:BB:CC:DD:EE:FF"  # required for Wake-on-LAN power on
    inputs:                   # source_name: LG HDMI input id
      shield: "HDMI_1"
      gaming_pc: "HDMI_2"
    # client key provided via LG_CLIENT_KEY in .env (paired on first connect)
  plex:                       # Pool House playback target on the shared server
    player_id: "REPLACE_WITH_CLIENT_IDENTIFIER"
    player_name: "Pool House SHIELD"
  shield:                     # Nvidia Shield over ADB (non-Plex now-playing)
    host: "192.168.1.53"
    port: 5555                # enable "Network debugging" on the Shield
    key_dir: "/data"          # mount a writable volume so the ADB key persists
  default_source: "shield"

ac_mx_44x:
  host: "192.168.1.40"
  port: 23
  inputs:
    gaming_pc: 1
  outputs:
    theater: 1
    pool_house: 2

mxnet:
  cbox_host: "192.168.1.41"
  cbox_port: 24
  encoders:
    gaming_pc: "ENC1"
  decoders:
    theater: "DEC1"
    pool_house: "DEC2"
