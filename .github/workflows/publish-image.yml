name: Publish container image

# Builds the single backend+frontend image and pushes it to the GitHub
# Container Registry (GHCR) so the theater host can pull it instead of building
# locally. Triggers on version tags (v1.2.3) and on main. See docs/DEPLOYMENT.md.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    # On a version tag, publish a GitHub Release with a ready-to-deploy bundle.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble deploy bundle
        run: |
          version="${GITHUB_REF_NAME#v}"
          dir="theater-control-deploy-${version}"
          mkdir -p "$dir/config"
          cp docker-compose.yml "$dir/"
          cp .env.example "$dir/"
          cp config/devices.example.yaml "$dir/config/"
          cp docs/DEPLOYMENT.md "$dir/"
          cp README.md LICENSE "$dir/"
          zip -r "${dir}.zip" "$dir"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: theater-control ${{ github.ref_name }}
          generate_release_notes: true
          files: theater-control-deploy-*.zip
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            The attached `theater-control-deploy-*.zip` contains the compose file,
            example `.env`, example `config/devices.yaml`, and the deployment guide.
            See docs/DEPLOYMENT.md for the two install paths (build vs pull).
